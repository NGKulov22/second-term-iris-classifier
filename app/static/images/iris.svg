<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Stem -->
  <line x1="100" y1="280" x2="100" y2="80" stroke="#2d5016" stroke-width="3" stroke-linecap="round"/>

  <!-- Leaves -->
  <ellipse cx="85" cy="200" rx="8" ry="25" fill="#2d8659" transform="rotate(-30 85 200)"/>
  <ellipse cx="115" cy="220" rx="8" ry="25" fill="#3a9b6f" transform="rotate(35 115 220)"/>

  <!-- Outer Petals (upper) -->
  <ellipse cx="100" cy="40" rx="18" ry="35" fill="#8b5cf6" opacity="0.9"/>
  <ellipse cx="65" cy="70" rx="16" ry="32" fill="#a78bfa" opacity="0.85" transform="rotate(-40 65 70)"/>
  <ellipse cx="135" cy="70" rx="16" ry="32" fill="#a78bfa" opacity="0.85" transform="rotate(40 135 70)"/>

  <!-- Middle Petals -->
  <ellipse cx="50" cy="100" rx="14" ry="28" fill="#7c3aed" opacity="0.88" transform="rotate(-60 50 100)"/>
  <ellipse cx="150" cy="100" rx="14" ry="28" fill="#7c3aed" opacity="0.88" transform="rotate(60 150 100)"/>

  <!-- Inner Petals (lower) -->
  <ellipse cx="85" cy="120" rx="12" ry="24" fill="#6d28d9" opacity="0.9" transform="rotate(-35 85 120)"/>
  <ellipse cx="115" cy="120" rx="12" ry="24" fill="#6d28d9" opacity="0.9" transform="rotate(35 115 120)"/>
  <ellipse cx="100" cy="140" rx="13" ry="25" fill="#5b21b6" opacity="0.95"/>

  <!-- Center details -->
  <circle cx="100" cy="110" r="8" fill="#f3e8ff" opacity="0.6"/>
  <circle cx="98" cy="108" r="3" fill="#ddd6fe" opacity="0.4"/>
</svg>

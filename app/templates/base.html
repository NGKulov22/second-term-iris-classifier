<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="bg-light border-bottom py-3">
        <div class="container-lg">
            <div class="d-flex justify-content-between align-items-center">
                <!-- Logo -->
                <a href="{{ url_for('main.index') }}" class="text-decoration-none text-dark fw-bold fs-5">
                    🌸 Iris Classifier
                </a>

                <!-- Navigation Menu -->
                <div class="d-flex gap-4">
                    <a href="{{ url_for('predict.predict') }}" class="text-decoration-none text-dark">Прогноза</a>
                    <a href="{{ url_for('results.results') }}" class="text-decoration-none text-dark">Резултати</a>
                </div>

                <div class="d-flex gap-3">
                    {% if current_user.is_authenticated %}
                    <a href="{{ url_for('auth.logout') }}" class="text-decoration-none text-dark">Logout</a>
                    {% else %}
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none text-dark">Login</a>
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none text-dark fw-bold">Register</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

</body>
</html>

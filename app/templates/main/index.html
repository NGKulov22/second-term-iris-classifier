{% extends "base.html" %}

{% block content %}
<section class="py-5" style="background-color: #f5f5f5;">
    <div class="container-lg">
        <div class="row align-items-center g-5">
            <!-- Left Column - Text -->
            <div class="col-lg-6">
                <h1 class="display-4 fw-bold mb-4" style="color: #1a1a1a;">
                    Класификатор<br>на цветя Ирис
                </h1>

                <p class="fs-5 mb-5 text-muted">
                    Предсказвайте видовете с прецизност, използвайки машинно обучение.
                </p>

                <a href="{{ url_for('predict.predict') }}" class="btn btn-lg fw-bold"
                   style="background-color: #6b4c9a; color: white; border: none;">
                    Започнете предсказването
                </a>
            </div>

            <!-- Right Column - Image -->
            <div class="col-lg-6 text-center">
                <img src="{{ url_for('static', filename='images/iris.svg') }}"
                     alt="Iris Flower"
                     class="img-fluid"
                     style="max-width: 100%; height: auto;">
            </div>
        </div>
    </div>
</section>
{% endblock %}
